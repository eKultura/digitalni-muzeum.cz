<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/three@0.130.1/build/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.130.1/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.130.1/examples/js/loaders/FBXLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.130.1/examples/js/loaders/OBJLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.130.1/examples/js/loaders/STLLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/fflate@0.8.2/umd/index.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.130.1/examples/js/loaders/MTLLoader.js"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f0f0f0;
        }

        .button-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #45a049;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: white;
            padding: 20px;
            border-radius: 5px;
            width: 80%;
            max-width: 600px;
        }

        .close {
            position: absolute;
            right: 10px;
            top: 10px;
            font-size: 24px;
            cursor: pointer;
        }

        #codeInput {
            width: 100%;
            height: 150px;
            margin: 10px 0;
            padding: 10px;
            font-family: monospace;
        }

        #modelViewer {
            width: 100%;
            height: 400px;
            border: 1px solid #ccc;
            margin-top: 20px;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <script src="3dmodelv2.js"></script>
    <script src="3dModelVR.js"></script>

    <div class="button-container">
       
       
    </div>
            <div id="3dModelScreen" style="height: 500px; width: 500px;">

            </div>
    <div id="codeModal" class="modal">
        <div class="modal-content" >
            <span class="close" onclick="closeModal()">&times;</span>

        </div>
    </div>

    <script>
        function renderModels(color, modelPath,autootexture) {
            const obj = new Louder3dModelVR( {
     backcolor: color,  
     objectName: modelPath,
     autotexture: autootexture,
     stlObjectColor:"#c0c0c0"
     //cameraPosition: { x: 0, y: 5, z: 10 },
     //modelScale: { x: 1.5, y: 1.5, z: 1.5 }
 });
//obj.stlObjectColor ="#c0c0c0";
            //openModal();
            obj.renderModel();
        }

        function openModal() {
            document.getElementById('codeModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('codeModal').style.display = 'none';
        }

        function executeCode() {
            const code = document.getElementById('codeInput').value;
            try {
                eval(code); // Upozornění: eval může být nebezpečný v produkčním prostředí
            } catch (error) {
                alert('Chyba při spuštění kódu: ' + error.message);
            }
            closeModal();
        }

        // Zavření modalu při kliknutí mimo něj
        window.onclick = function(event) {
            const modal = document.getElementById('codeModal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        renderModels('#FFFFFF', 'models/WineCup.stl');
    </script>
</body>
</html>
