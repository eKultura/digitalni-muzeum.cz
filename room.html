<!DOCTYPE html>
<html>
<head>
    <title>Virtual Room</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.128.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import { VirtualRoomWithModels } from './VirtualRoom.js';
        
        const virtualRoom = new VirtualRoomWithModels();
        virtualRoom.addModel({
            id: 'wineCup',
            path: './models/WineCup.stl',  // Ujistěte se, že máte tento soubor ve složce models
            position: { x: 2, y: 1.5, z: -3 },
            rotation: { x: -Math.PI / 2, y: 0, z: Math.PI / 6 },
            scale: { x: 1.0, y: 1.0, z: 1.0 },
            modelColor: '#c0c0c0',
            autoRotate: true,
        });
    </script>
</body>
</html>
